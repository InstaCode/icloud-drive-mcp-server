name: Publish to npm and MCP Registry

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    env:
      XDG_CONFIG_HOME: ${{ github.workspace }}/xdg-config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1.
      # Node 22 ships with npm 10.x, so we upgrade explicitly.
      - name: Upgrade npm (pinned)
        run: npm install -g npm@11.9.0

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

      # ─── MCP Registry publish ──────────────────────────────────────────────
      # Runs only after npm publish succeeds. Same OIDC token, same trust model.
      # No new secrets required.

      - name: Sync server.json version with package.json
        # `npm version` only bumps package.json. This keeps server.json's
        # top-level version and each packages[].version field in sync, so
        # tagging a release doesn't desync the two files.
        run: |
          VER=$(node -p "require('./package.json').version")
          jq --arg v "$VER" '.version = $v | .packages |= map(.version = $v)' \
            server.json > server.json.tmp && mv server.json.tmp server.json
          echo "server.json synced to $VER"

      - name: Install mcp-publisher
        shell: bash
        run: |
          set -euo pipefail
      
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            arm64|aarch64) ARCH="arm64" ;;
          esac
      
          URL="https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz"
      
          curl -fsSL "$URL" | tar xz mcp-publisher
          chmod +x ./mcp-publisher
          ./mcp-publisher --version

      - name: Prepare mcp-publisher config dir
        run: mkdir -p "$XDG_CONFIG_HOME"
      - name: Validate server.json
        run: ./mcp-publisher publish --dry-run

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
